services:
  chromadb:
    image: chromadb/chroma:0.5.20
    container_name: assistant-chromadb
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

  searxng:
    image: searxng/searxng:latest
    container_name: assistant-searxng
    restart: unless-stopped
    ports:
      - "8888:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
      - SEARXNG_SECRET=${SEARXNG_SECRET:-change-me-please-use-a-long-random-string}
      - UWSGI_WORKERS=2
      - UWSGI_THREADS=4

  ollama:
    image: ollama/ollama:latest
    container_name: assistant-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    # Uncomment to enable NVIDIA GPU acceleration:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  ingest-api:
    build: ./ingest-api
    container_name: assistant-ingest-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - COLLECTION_NAME=documents
      - SEARXNG_URL=http://searxng:8080
      - OLLAMA_URL=http://ollama:11434
      - DEFAULT_MODEL=${DEFAULT_MODEL:-llama3.2:3b}
    depends_on:
      - chromadb
      - searxng
      - ollama

volumes:
  chroma-data:
  ollama-data:
