services:
  chromadb:
    image: chromadb/chroma:0.5.20
    container_name: assistant-chromadb
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

  ingest-api:
    build: ./ingest-api
    container_name: assistant-ingest-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - COLLECTION_NAME=documents
    depends_on:
      - chromadb

volumes:
  chroma-data:
